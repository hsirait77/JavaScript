<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Boolean Check Function </title>
</head>
<body>
	<script>
		   function booWho(check) {
		     	   if( check === true ) {
		     	   	   return true;
		     	   } else if(check === false) 
                    return true;
		     	   else {
		     	   	  return false;
		     	   }
		     } 

		      console.log(booWho(true));
		      console.log(booWho(false));
	</script>
</body>
</html>
